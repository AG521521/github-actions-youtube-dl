name: Download YouTube Videos

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install --upgrade yt-dlp

      - name: Download videos from playlist.txt
        run: |
          mkdir -p downloads
          # 跳过空行，逐条下载
          while IFS= read -r url; do
            if [[ -n "$url" ]]; then
              echo "Downloading: $url"
              yt-dlp -o "downloads/%(title)s.%(ext)s" --no-playlist --no-check-certificate "$url"
            fi
          done < playlist.txt

      - name: Upload downloaded videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: downloads/
